# Quantum Model Configuration
quantum:
  angle_encoding:
    n_qubits: 8
    n_layers: 2
    learning_rate: 0.01
    epochs: 50
    
  amplitude_encoding:
    n_qubits: 3  # 2^3 = 8 features
    n_layers: 2
    learning_rate: 0.01
    epochs: 50

# Data Configuration
data:
  dataset: "delaney"  # or "qm9"
  test_size: 0.2
  random_state: 42
  features:
    - "MolWt"
    - "MolLogP"
    - "NumHAcceptors"
    - "NumHDonors"
    - "NumRotatableBonds"
    - "NumHeteroatoms"
    - "HeavyAtomCount"
    - "NumSaturatedHeterocycles"

# Training Configuration
training:
  batch_size: 32
  optimizer: "adam"
  loss_function: "mse"
  early_stopping: true
  patience: 10

# Results
results:
  save_models: true
  save_predictions: true
  generate_plots: true
